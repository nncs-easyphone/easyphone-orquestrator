services:
  traefik:
    image: traefik:v3
    container_name: ${COMPOSE_PROJECT_NAME}-traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_data:/etc/traefik
    networks:
      - traefik-public
    command:
      - "--providers.docker=true"
      - "--providers.docker.network=${COMPOSE_PROJECT_NAME}-traefik-public"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/etc/traefik/acme.json"

  postgres:
    image: postgres:${POSTGRES_IMAGE_TAG}
    container_name: ${COMPOSE_PROJECT_NAME}-pg
    restart: unless-stopped
    ports:
      - "${PG_PORT_HOST}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${TZ}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: ${COMPOSE_PROJECT_NAME}-pgbouncer
    restart: unless-stopped
    ports:
      - "${PGBOUNCER_PORT_HOST}:6432"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      LISTEN_PORT: "6432"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "200"
      DEFAULT_POOL_SIZE: "30"
      MIN_POOL_SIZE: "20"
      RESERVE_POOL_SIZE: "10"
      MAX_USER_CONNECTIONS: "50"
      SERVER_LOGIN_RETRY: "3"
      QUERY_TIMEOUT: "300"
      CLIENT_IDLE_TIMEOUT: "600"
      PKT_BUF: "8192"
      MAX_PREPARED_STATEMENTS: "100"
      IGNORE_STARTUP_PARAMETERS: "extra_float_digits,application_name"
      STATS_USERS: postgres
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: pg_isready -h localhost -p 6432 -U ${POSTGRES_USER}
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  migrations:
    image: ${API_IMAGE}
    build:
      context: ../easyphone-api
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME}-migrations
    command: sh -c "npx prisma migrate deploy"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DIRECT_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy

  asterisk:
    image: ${ASTERISK_IMAGE}
    build:
      context: ../easyphone-asterisk
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME}-asterisk
    restart: unless-stopped
    # Host networking: SIP/RTP nativo (sem NAT/proxy do Docker). Evita o problema
    # de publicar ~10 mil portas UDP de RTP (que estourava a RAM no VPS) e o áudio
    # em sentido único do NAT. NÃO usar 'ports:' com host networking — o Asterisk
    # já escuta nas portas reais do host (5060/5061/5038/8088/8089 + RTP 10000-20000).
    network_mode: host
    environment:
      # Em host networking o nome de serviço 'postgres' (bridge) não resolve;
      # o Postgres é publicado em ${PG_PORT_HOST} no host.
      DB_HOST: 127.0.0.1
      DB_PORT: "${PG_PORT_HOST}"
      DB_NAME: ${ASTERISK_DB_NAME}
      DB_USER: ${ASTERISK_DB_USER}
      DB_PASS: ${ASTERISK_DB_PASS}
    healthcheck:
      test: ["CMD-SHELL", "asterisk -rx \"core waitfullybooted\" | grep -q \"fully booted\" || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      - asterisk_config:/etc/asterisk
      - asterisk_lib:/var/lib/asterisk
      - asterisk_log:/var/log/asterisk
      - asterisk_monitor:/var/spool/asterisk/monitor
    cap_add:
      - SYS_NICE
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully

  seed:
    image: ${API_IMAGE}
    build:
      context: ../easyphone-api
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME}-seed
    command: sh -c "npx prisma db seed"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DIRECT_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    # Asterisk está em host networking; alcança-se AMI/ARI via gateway do host.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - asterisk_config:/etc/asterisk
      - asterisk_lib:/var/lib/asterisk
      - asterisk_log:/var/log/asterisk
      - asterisk_monitor:/var/spool/asterisk/monitor
    depends_on:
      pgbouncer:
        condition: service_started
      asterisk:
        condition: service_started
      migrations:
        condition: service_completed_successfully

  api:
    image: ${API_IMAGE}
    build:
      context: ../easyphone-api
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME}-api
    restart: unless-stopped
    ports: []
    networks:
      - default
      - traefik-public
    # Asterisk está em host networking; alcança-se AMI/ARI via gateway do host
    # (VITE_ASTERISK_HOST=host.docker.internal no .env).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      TZ: ${TZ}
      NODE_ENV: ${NODE_ENV}
      PORT: "${API_PORT_CONTAINER}"
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:6432/${POSTGRES_DB}?pgbouncer=true
      DIRECT_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      MUSIC_ON_HOLD_FOLDER_PATH: ${MUSIC_ON_HOLD_FOLDER_PATH}
      AUDIO_URA_FOLDER_PATH: ${AUDIO_URA_FOLDER_PATH}
      VITE_MAX_FILE_SIZE_UPLOAD_MOH: "${VITE_MAX_FILE_SIZE_UPLOAD_MOH}"
      MAX_CAPTURE_GROUPS: "${MAX_CAPTURE_GROUPS}"
      VITE_EF_FILES_FOLDER_PATH: ${VITE_EF_FILES_FOLDER_PATH}
      VITE_ASTERISK_HOST: ${VITE_ASTERISK_HOST}
      VITE_ASTERISK_ARI_PORT: "${VITE_ASTERISK_ARI_PORT}"
      VITE_ASTERISK_AMI_PORT: "${VITE_ASTERISK_AMI_PORT}"
      VITE_ASTERISK_USERNAME: ${VITE_ASTERISK_USERNAME}
      VITE_ASTERISK_PASSWORD: ${VITE_ASTERISK_PASSWORD}
      VITE_TIMEOUT_ORIGINATE_LOGIN_CALL_MS: "${VITE_TIMEOUT_ORIGINATE_LOGIN_CALL_MS}"
      VITE_APP_NAME_ARI_ASTERISK: ${VITE_APP_NAME_ARI_ASTERISK}
      PRISMA_LOGS_OFF: "${PRISMA_LOGS_OFF}"
      PG_POOL_MAX: "${PG_POOL_MAX}"
      PG_POOL_MIN: "${PG_POOL_MIN}"
      DATA_SECRET_CRYPTOGRAPHY_KEY: ${DATA_SECRET_CRYPTOGRAPHY_KEY}
      AI_AUDIO_GENERATION_ENDPOINT: ${AI_AUDIO_GENERATION_ENDPOINT}
      ACTIVATE_DISCADOR_MAILING: "${ACTIVATE_DISCADOR_MAILING}"
      VITE_EF_CALL_RECORD_FOLDER_PATH: ${VITE_EF_CALL_RECORD_FOLDER_PATH}
      EF_AMI_DIALPLAN_EXTENSION_CONTEXT: ${EF_AMI_DIALPLAN_EXTENSION_CONTEXT}
      EF_DIALPLAN_EXTENSION_CONTEXT_BLOCK: ${EF_DIALPLAN_EXTENSION_CONTEXT_BLOCK}
      FIREBASE_SERVICE_ACCOUNT: ${FIREBASE_SERVICE_ACCOUNT}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.${DOMAIN}`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.services.api.loadbalancer.server.port=${API_PORT_CONTAINER}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:$$PORT/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - asterisk_config:/etc/asterisk
      - asterisk_lib:/var/lib/asterisk
      - asterisk_log:/var/log/asterisk
      - asterisk_monitor:/var/spool/asterisk/monitor
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_started
      migrations:
        condition: service_completed_successfully
      asterisk:
        condition: service_started
      seed:
        condition: service_completed_successfully

  web:
    image: ${WEB_IMAGE}
    build:
      context: ../easyphone-web
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME}-web
    restart: unless-stopped
    ports: []
    networks:
      - default
      - traefik-public
    environment:
      PORT: "3000"
      VITE_API_URL: ${VITE_API_URL}
      VITE_API_DELAY: "${VITE_API_DELAY}"
      VITE_ENABLE_API_DELAY: "${VITE_ENABLE_API_DELAY}"
      VITE_FORMAT_FILES_UPLOAD_MOH: ${VITE_FORMAT_FILES_UPLOAD_MOH}
      VITE_MAX_FILES_UPLOAD_MOH: "${VITE_MAX_FILES_UPLOAD_MOH}"
      VITE_MAX_FILE_SIZE_UPLOAD_MOH: "${VITE_MAX_FILE_SIZE_UPLOAD_MOH}"
      VITE_MAX_FILE_SIZE_UPLOAD_IVR_AUDIO: "${VITE_MAX_FILE_SIZE_UPLOAD_IVR_AUDIO}"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=Host(`app.${DOMAIN}`)"
      - "traefik.http.routers.web.entrypoints=websecure"
      - "traefik.http.routers.web.tls.certresolver=letsencrypt"
      - "traefik.http.services.web.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:$$PORT/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      api:
        condition: service_started

volumes:
  pgdata:
  asterisk_config:
  asterisk_lib:
  asterisk_log:
  asterisk_monitor:
  traefik_data:

networks:
  traefik-public:
    name: ${COMPOSE_PROJECT_NAME}-traefik-public
