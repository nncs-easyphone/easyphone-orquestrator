services:
  postgres:
    image: postgres:${POSTGRES_IMAGE_TAG}
    container_name: ${COMPOSE_PROJECT_NAME}-pg
    restart: unless-stopped
    ports:
      - "${PG_PORT_HOST}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${TZ}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  migrations:
    image: ${API_IMAGE}
    build:
      context: ../easyphone-api
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME}-migrations
    command: sh -c "npx prisma migrate deploy"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_DATABASE_URL: ${DIRECT_DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy

  asterisk:
    image: ${ASTERISK_IMAGE}
    build:
      context: ../easyphone-asterisk
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME}-asterisk
    restart: unless-stopped
    ports:
      - "5060:5060"
      - "5061:5061"
      - "5038:5038"
      - "8088:8088"
      - "8089:8089"
      - "10000-20000:10000-20000/udp"
    environment:
      DB_HOST: ${ASTERISK_DB_HOST}
      DB_PORT: "${ASTERISK_DB_PORT}"
      DB_NAME: ${ASTERISK_DB_NAME}
      DB_USER: ${ASTERISK_DB_USER}
      DB_PASS: ${ASTERISK_DB_PASS}
    healthcheck:
      test: ["CMD-SHELL", "asterisk -rx \"core waitfullybooted\" | grep -q \"fully booted\" || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      - asterisk_config:/etc/asterisk
      - asterisk_lib:/var/lib/asterisk
      - asterisk_log:/var/log/asterisk
      - asterisk_monitor:/var/spool/asterisk/monitor
    cap_add:
      - SYS_NICE
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully

  seed:
    image: ${API_IMAGE}
    build:
      context: ../easyphone-api
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME}-seed
    command: sh -c "npx prisma db seed"
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_DATABASE_URL: ${DIRECT_DATABASE_URL}
    volumes:
      - asterisk_config:/etc/asterisk
      - asterisk_lib:/var/lib/asterisk
      - asterisk_log:/var/log/asterisk
      - asterisk_monitor:/var/spool/asterisk/monitor
    depends_on:
      asterisk:
        condition: service_started
      migrations:
        condition: service_completed_successfully

  api:
    image: ${API_IMAGE}
    build:
      context: ../easyphone-api
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME}-api
    restart: unless-stopped
    ports:
      - "${API_PORT_HOST}:${API_PORT_CONTAINER}"
    environment:
      TZ: ${TZ}
      NODE_ENV: ${NODE_ENV}
      PORT: "${API_PORT_CONTAINER}"
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_DATABASE_URL: ${DIRECT_DATABASE_URL}
      MUSIC_ON_HOLD_FOLDER_PATH: ${MUSIC_ON_HOLD_FOLDER_PATH}
      AUDIO_URA_FOLDER_PATH: ${AUDIO_URA_FOLDER_PATH}
      VITE_MAX_FILE_SIZE_UPLOAD_MOH: "${VITE_MAX_FILE_SIZE_UPLOAD_MOH}"
      MAX_CAPTURE_GROUPS: "${MAX_CAPTURE_GROUPS}"
      VITE_EF_FILES_FOLDER_PATH: ${VITE_EF_FILES_FOLDER_PATH}
      VITE_ASTERISK_HOST: ${VITE_ASTERISK_HOST}
      VITE_ASTERISK_ARI_PORT: "${VITE_ASTERISK_ARI_PORT}"
      VITE_ASTERISK_AMI_PORT: "${VITE_ASTERISK_AMI_PORT}"
      VITE_ASTERISK_USERNAME: ${VITE_ASTERISK_USERNAME}
      VITE_ASTERISK_PASSWORD: ${VITE_ASTERISK_PASSWORD}
      VITE_TIMEOUT_ORIGINATE_LOGIN_CALL_MS: "${VITE_TIMEOUT_ORIGINATE_LOGIN_CALL_MS}"
      VITE_APP_NAME_ARI_ASTERISK: ${VITE_APP_NAME_ARI_ASTERISK}
      PRISMA_LOGS_OFF: "${PRISMA_LOGS_OFF}"
      PG_POOL_MAX: "${PG_POOL_MAX}"
      PG_POOL_MIN: "${PG_POOL_MIN}"
      DATA_SECRET_CRYPTOGRAPHY_KEY: ${DATA_SECRET_CRYPTOGRAPHY_KEY}
      AI_AUDIO_GENERATION_ENDPOINT: ${AI_AUDIO_GENERATION_ENDPOINT}
      ACTIVATE_DISCADOR_MAILING: "${ACTIVATE_DISCADOR_MAILING}"
      VITE_EF_CALL_RECORD_FOLDER_PATH: ${VITE_EF_CALL_RECORD_FOLDER_PATH}
      EF_AMI_DIALPLAN_EXTENSION_CONTEXT: ${EF_AMI_DIALPLAN_EXTENSION_CONTEXT}
      EF_DIALPLAN_EXTENSION_CONTEXT_BLOCK: ${EF_DIALPLAN_EXTENSION_CONTEXT_BLOCK}
      FIREBASE_SERVICE_ACCOUNT: ${FIREBASE_SERVICE_ACCOUNT}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:$$PORT/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - asterisk_config:/etc/asterisk
      - asterisk_lib:/var/lib/asterisk
      - asterisk_log:/var/log/asterisk
      - asterisk_monitor:/var/spool/asterisk/monitor
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
      asterisk:
        condition: service_started
      seed:
        condition: service_completed_successfully

  web:
    image: ${WEB_IMAGE}
    build:
      context: ../easyphone-web
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME}-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT_HOST}:${WEB_PORT_CONTAINER}"
    environment:
      PORT: "${WEB_PORT_CONTAINER}"
      VITE_API_URL: ${VITE_API_URL}
      VITE_API_DELAY: "${VITE_API_DELAY}"
      VITE_ENABLE_API_DELAY: "${VITE_ENABLE_API_DELAY}"
      VITE_FORMAT_FILES_UPLOAD_MOH: ${VITE_FORMAT_FILES_UPLOAD_MOH}
      VITE_MAX_FILES_UPLOAD_MOH: "${VITE_MAX_FILES_UPLOAD_MOH}"
      VITE_MAX_FILE_SIZE_UPLOAD_MOH: "${VITE_MAX_FILE_SIZE_UPLOAD_MOH}"
      VITE_MAX_FILE_SIZE_UPLOAD_IVR_AUDIO: "${VITE_MAX_FILE_SIZE_UPLOAD_IVR_AUDIO}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:$$PORT/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      api:
        condition: service_started

volumes:
  pgdata:
  asterisk_config:
  asterisk_lib:
  asterisk_log:
  asterisk_monitor:
