services:
  traefik:
    image: traefik:v3
    container_name: easyfone-traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_data:/etc/traefik
      - ./traefik/conf:/etc/traefik/conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default          # FIX 1: adicionado para garantir alcance a api/web mesmo sem label
      - traefik-public
    command:
      - "--providers.docker=true"
      - "--providers.docker.network=easyfone-traefik-public"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.file.directory=/etc/traefik/conf"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/etc/traefik/acme.json"

  postgres:
    image: postgres:17-alpine
    container_name: easyfone-pg
    restart: unless-stopped
    ports:
      - "7001:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: UTC
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: easyfone-pgbouncer
    restart: unless-stopped
    ports:
      - "7003:6432"
    environment:
      AUTH_TYPE: scram-sha-256
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      LISTEN_PORT: "6432"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "200"
      DEFAULT_POOL_SIZE: "30"
      MIN_POOL_SIZE: "20"
      RESERVE_POOL_SIZE: "10"
      MAX_USER_CONNECTIONS: "50"
      SERVER_LOGIN_RETRY: "3"
      QUERY_TIMEOUT: "300"
      CLIENT_IDLE_TIMEOUT: "600"
      PKT_BUF: "8192"
      MAX_PREPARED_STATEMENTS: "100"
      IGNORE_STARTUP_PARAMETERS: "extra_float_digits,application_name"
      STATS_USERS: postgres
    networks:
      - default
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: pg_isready -h localhost -p 6432 -U ${POSTGRES_USER}
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  migrations:
    image: ghcr.io/nncs-easyphone/easyphone-api:main
    build:
      context: ../easyphone-api
      dockerfile: Dockerfile
    container_name: easyfone-migrations
    command: sh -c "npx prisma migrate deploy"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DIRECT_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    networks:
      - default
    depends_on:
      postgres:
        condition: service_healthy

  # Extrai o certificado de pbx.${DOMAIN} do acme.json do Traefik para um volume
  # que o Coturn lê (TURNS na 5349). O --watch reescreve os arquivos a cada
  # renovação, sem intervenção manual.
  certs-dumper:
    image: ldez/traefik-certs-dumper:v2.10.0
    container_name: easyfone-certs-dumper
    restart: unless-stopped
    command:
      - "file"
      - "--version=v2"
      - "--watch"
      - "--source=/traefik/acme.json"
      - "--dest=/certs"
      - "--domain-subdir"
      - "--post-hook=chmod -R a+rX /certs"
    volumes:
      - traefik_data:/traefik:ro
      - coturn_certs:/certs
    depends_on:
      - traefik

  coturn:
    image: coturn/coturn:latest
    container_name: easyfone-coturn
    restart: unless-stopped
    network_mode: host
    # Sem `command`: o CMD oficial da imagem já é
    #   ["--log-file=stdout", "--external-ip=$(detect-external-ip)"]
    # e o turnserver lê /etc/coturn/turnserver.conf automaticamente. Sobrescrever
    # o command descartava a autodetecção do IP público.
    # Sem `user`: a imagem roda como nobody:nogroup e o --post-hook do
    # certs-dumper (chmod a+rX) já deixa os certificados legíveis.
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
      - coturn_certs:/certs:ro
    cap_add:
      - NET_ADMIN
    depends_on:
      - certs-dumper

  asterisk:
    image: ghcr.io/nncs-easyphone/easyphone-asterisk:main
    build:
      context: ../easyphone-asterisk
      dockerfile: Dockerfile
    container_name: easyfone-asterisk
    restart: unless-stopped
    network_mode: host
    environment:
      DB_HOST: 127.0.0.1
      DB_PORT: "7001"
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASS: ${POSTGRES_PASSWORD}
      # Vazia (VM com IP público direto na interface): o entrypoint remove o
      # stunaddr do rtp.conf. Um stunaddr sem resposta bloqueia ~3-8s a criação
      # de CADA instância RTP (toda chamada, qualquer ramal). Se precisar de
      # STUN, aponte para o Coturn público (ex.: pbx.dominio.com.br:3478) e
      # confirme que responde antes.
      ASTERISK_STUN_ADDR: ${ASTERISK_STUN_ADDR:-}
    healthcheck:
      test: ["CMD-SHELL", "asterisk -rx \"core waitfullybooted\" | grep -q \"fully booted\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    volumes:
      - asterisk_config:/etc/asterisk
      - asterisk_lib:/var/lib/asterisk
      - asterisk_log:/var/log/asterisk
      - asterisk_monitor:/var/spool/asterisk/monitor
    cap_add:
      - SYS_NICE
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully

  seed:
    image: ghcr.io/nncs-easyphone/easyphone-api:main
    build:
      context: ../easyphone-api
      dockerfile: Dockerfile
    container_name: easyfone-seed
    command: sh -c "npx prisma db seed"
    environment:
      NODE_ENV: ${NODE_ENV}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DIRECT_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      MUSIC_ON_HOLD_FOLDER_PATH: ${MUSIC_ON_HOLD_FOLDER_PATH}
      AUDIO_URA_FOLDER_PATH: ${AUDIO_URA_FOLDER_PATH}
      VITE_MAX_FILE_SIZE_UPLOAD_MOH: "${VITE_MAX_FILE_SIZE_UPLOAD_MOH}"
      MAX_CAPTURE_GROUPS: "${MAX_CAPTURE_GROUPS}"
      VITE_EF_FILES_FOLDER_PATH: ${VITE_EF_FILES_FOLDER_PATH}
      VITE_ASTERISK_HOST: host.docker.internal
      VITE_ASTERISK_ARI_PORT: "8088"
      VITE_ASTERISK_AMI_PORT: "5038"
      VITE_ASTERISK_USERNAME: easyphone
      VITE_ASTERISK_PASSWORD: default-secret
      VITE_TIMEOUT_ORIGINATE_LOGIN_CALL_MS: "15000"
      VITE_APP_NAME_ARI_ASTERISK: easyphone
      PRISMA_LOGS_OFF: "true"
      PG_POOL_MAX: "20"
      PG_POOL_MIN: "10"
      DATA_SECRET_CRYPTOGRAPHY_KEY: ${DATA_SECRET_CRYPTOGRAPHY_KEY}
      EASYPHONE_FIREBASE_URL: ${EASYPHONE_FIREBASE_URL}
      ACTIVATE_DISCADOR_MAILING: "${ACTIVATE_DISCADOR_MAILING}"
      VITE_EF_CALL_RECORD_FOLDER_PATH: ${VITE_EF_CALL_RECORD_FOLDER_PATH}
      EF_AMI_DIALPLAN_EXTENSION_CONTEXT: ${EF_AMI_DIALPLAN_EXTENSION_CONTEXT}
      EF_DIALPLAN_EXTENSION_CONTEXT_BLOCK: ${EF_DIALPLAN_EXTENSION_CONTEXT_BLOCK}
      EASYPHONE_FIREBASE_SERVICE_ACCOUNT: ${EASYPHONE_FIREBASE_SERVICE_ACCOUNT}
      EASYPHONE_LICENSE_CLIENT_ID: ${EASYPHONE_LICENSE_CLIENT_ID}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
    volumes:
      - asterisk_config:/etc/asterisk
      - asterisk_lib:/var/lib/asterisk
      - asterisk_log:/var/log/asterisk
      - asterisk_monitor:/var/spool/asterisk/monitor
    depends_on:
      pgbouncer:
        condition: service_started
      asterisk:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully

  api:
    image: ghcr.io/nncs-easyphone/easyphone-api:main
    build:
      context: ../easyphone-api
      dockerfile: Dockerfile
    container_name: easyfone-api
    restart: unless-stopped
    ports: []
    networks:
      - default
      - traefik-public
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      TZ: UTC
      NODE_ENV: ${NODE_ENV}
      PORT: "7002"
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: https://app.${DOMAIN}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:6432/${POSTGRES_DB}?pgbouncer=true
      DIRECT_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      MUSIC_ON_HOLD_FOLDER_PATH: ${MUSIC_ON_HOLD_FOLDER_PATH}
      AUDIO_URA_FOLDER_PATH: ${AUDIO_URA_FOLDER_PATH}
      VITE_MAX_FILE_SIZE_UPLOAD_MOH: "${VITE_MAX_FILE_SIZE_UPLOAD_MOH}"
      MAX_CAPTURE_GROUPS: "${MAX_CAPTURE_GROUPS}"
      VITE_EF_FILES_FOLDER_PATH: ${VITE_EF_FILES_FOLDER_PATH}
      VITE_ASTERISK_HOST: host.docker.internal
      VITE_ASTERISK_ARI_PORT: "8088"
      VITE_ASTERISK_AMI_PORT: "5038"
      VITE_ASTERISK_USERNAME: easyphone
      VITE_ASTERISK_PASSWORD: default-secret
      VITE_TIMEOUT_ORIGINATE_LOGIN_CALL_MS: "15000"
      VITE_APP_NAME_ARI_ASTERISK: easyphone
      PRISMA_LOGS_OFF: "true"
      PG_POOL_MAX: "20"
      PG_POOL_MIN: "10"
      DATA_SECRET_CRYPTOGRAPHY_KEY: ${DATA_SECRET_CRYPTOGRAPHY_KEY}
      EASYPHONE_FIREBASE_URL: ${EASYPHONE_FIREBASE_URL}
      ACTIVATE_DISCADOR_MAILING: "${ACTIVATE_DISCADOR_MAILING}"
      VITE_EF_CALL_RECORD_FOLDER_PATH: ${VITE_EF_CALL_RECORD_FOLDER_PATH}
      EF_AMI_DIALPLAN_EXTENSION_CONTEXT: ${EF_AMI_DIALPLAN_EXTENSION_CONTEXT}
      EF_DIALPLAN_EXTENSION_CONTEXT_BLOCK: ${EF_DIALPLAN_EXTENSION_CONTEXT_BLOCK}
      EASYPHONE_FIREBASE_SERVICE_ACCOUNT: '${EASYPHONE_FIREBASE_SERVICE_ACCOUNT}'
      EASYPHONE_LICENSE_CLIENT_ID: ${EASYPHONE_LICENSE_CLIENT_ID}
      EASYPHONE_LICENSE_HARDWARE_ID: ${EASYPHONE_LICENSE_HARDWARE_ID}
      CORPORATE_ALLOW_API_KEY: ${CORPORATE_ALLOW_API_KEY}
      CORPORATE_API_KEY: ${CORPORATE_API_KEY}
      EASYPHONE_TRANSCRIBER_URL: http://transcriber:3335
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=easyfone-traefik-public"
      - "traefik.http.routers.api.rule=Host(`api.${DOMAIN}`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.services.api.loadbalancer.server.port=7002"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:$$PORT/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - asterisk_config:/etc/asterisk
      - asterisk_lib:/var/lib/asterisk
      - asterisk_log:/var/log/asterisk
      - asterisk_monitor:/var/spool/asterisk/monitor
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_started
      migrations:
        condition: service_completed_successfully
      asterisk:
        condition: service_started
      seed:
        condition: service_completed_successfully

  web:
    image: ghcr.io/nncs-easyphone/easyphone-web:main
    build:
      context: ../easyphone-web
      dockerfile: Dockerfile
    container_name: easyfone-web
    restart: unless-stopped
    ports: []
    networks:
      - default
      - traefik-public
    environment:
      PORT: "3000"
      VITE_API_URL: https://api.${DOMAIN}
      VITE_API_DELAY: "0"
      VITE_ENABLE_API_DELAY: "false"
      VITE_FORMAT_FILES_UPLOAD_MOH: ${VITE_FORMAT_FILES_UPLOAD_MOH}
      VITE_MAX_FILES_UPLOAD_MOH: "${VITE_MAX_FILES_UPLOAD_MOH}"
      VITE_MAX_FILE_SIZE_UPLOAD_MOH: "${VITE_MAX_FILE_SIZE_UPLOAD_MOH}"
      VITE_MAX_FILE_SIZE_UPLOAD_IVR_AUDIO: "${VITE_MAX_FILE_SIZE_UPLOAD_IVR_AUDIO}"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=easyfone-traefik-public"
      - "traefik.http.routers.web.rule=Host(`app.${DOMAIN}`)"
      - "traefik.http.routers.web.entrypoints=websecure"
      - "traefik.http.routers.web.tls.certresolver=letsencrypt"
      - "traefik.http.services.web.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:$$PORT/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      api:
        condition: service_started

volumes:
  pgdata:
  coturn_certs:
  asterisk_config:
  asterisk_lib:
  asterisk_log:
  asterisk_monitor:
  traefik_data:

networks:
  default:
    driver: bridge
  traefik-public:
    name: easyfone-traefik-public
